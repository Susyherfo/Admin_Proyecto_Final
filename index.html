<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Lens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🌿 Plant Lens</h1>
    <p>Sube una imagen de una planta</p>

    <input type="file" id="imageInput" accept="image/*">

    <div class="preview">
        <img id="previewImage" src="" alt="">
    </div>

    <button onclick="identifyPlant()">Identificar</button>

    <div class="result" id="result"></div>
</div>

<div class="card">
    <h3>🌿 Agregar información</h3>

    <label>Nombre de la planta</label>
    <input type="text" id="plantName">

    <label>Descripción</label>
    <textarea id="plantDescription"></textarea>

    <label>Cuidados</label>
    <textarea id="plantCare"></textarea>

    <button onclick="savePlant()">Guardar</button>
</div>

<script src="script.js"></script>
</body>
</html>
